# Publish crates.io + npm when a version tag is pushed (e.g. v0.1.1).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build guest + inspector assets for crate
        run: |
          npm run bundle --workspace=@tauri-plugin/visual-editor
          npm run build:inspector

      - name: Publish core crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p tauri-plugin-visual-editor-core --allow-dirty

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish plugin crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p tauri-plugin-visual-editor --features visual-inspector --allow-dirty

      - name: Build and publish SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run build --workspace=@tauri-plugin/visual-editor-sdk
          npm publish --workspace=@tauri-plugin/visual-editor-sdk --access public
