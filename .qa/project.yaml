# Project config for verify-ui and agent pipeline
# Generated by /project-setup — adjust navigation and paths as the product grows

appRoot: .

devCommand: npm run dev --workspace=examples/react-vite
devUrl: http://localhost:1420

checksCommand: npm run checks
e2eCommand: npm run test:e2e

styleguide: docs/UI_STYLEGUIDE.md
designDir: .qa/design
acceptanceDir: .qa/acceptance
evidenceDir: .qa/evidence

locale: de

viewports:
  - name: desktop
    width: 1280
    height: 720
  - name: inspector-panel
    width: 420
    height: 800

# Inspector window navigation labels — fill when UI exists
navigation:
  - Inspector
  - Settings
