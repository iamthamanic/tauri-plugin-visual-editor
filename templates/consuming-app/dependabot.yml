# Copy to Scriptony: .github/dependabot.yml
# Opens PRs when new plugin versions are published.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      visual-editor:
        patterns:
          - tauri-plugin-visual-editor*

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      visual-editor-sdk:
        patterns:
          - "@iamthamanic/visual-editor-sdk"
